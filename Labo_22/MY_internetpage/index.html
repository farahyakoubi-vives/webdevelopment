<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Internet Start Page</title>


    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">


    <link rel="stylesheet" href="styles/style.css">
</head>
<body>
<div class="container mt-5">

    <!-- BOVENSTE DEEL-->
    <h1>My Internet Start Page</h1>
    <p class="text-muted">Zoekopracht</p>

    <div class="mb-3">
        <label for="commandInput" class="form-label">Enter commando</label>
        <small class="form-text text-muted">Start your commando with '/[character] [zoekopracht]'</small>
        <input
                type="text"
                id="commandInput"
                class="form-control"
                placeholder="Enter commando"
        >
    </div>

    <button class="btn btn-success btn-lg w-100 mb-5" onclick="executeCommand()">GO!</button>

    <!-- ONDERSTE DEEL-->
    <h2>History</h2>
    <div class="row" id="historyContainer">

    </div>
</div>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>


<script src="scripts/script.js"></script>
</body>
</html>
