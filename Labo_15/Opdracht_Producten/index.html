<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Opdracht Number</title>
</head>
<body>
<h1>Opdracht Producten</h1>

<table border="1">
    <tr>
        <th>producten</th>
        <th>prijs</th>
        <th>aantal</th>
        <th>btw</th>
        <th>subtotaal</th>
    </tr>

    <tr>
        <td>product1</td>
        <td class="prijs">10.00 EUR</td>
        <td><input class="aantal" type="number" value="0"></td>
        <td class="btw">6%</td>
        <td class="subtotaal">0.00 EUR</td>
    </tr>

    <tr>
        <td>product2</td>
        <td class="prijs">15.00 Eur</td>
        <td><input class="aantal" type="number" value="0"></td>
        <td class="btw">21%</td>
        <td class="subtotaal">0.00 Eur</td>
    </tr>

    <tr>
        <td>product3</td>
        <td class="prijs">12.20 Eur</td>
        <td><input class="aantal" type="number" value="0"></td>
        <td class="btw">21%</td>
        <td class="subtotaal">0.00 Eur</td>
    </tr>

    <tr>
        <td colspan="4">totaal</td>
        <td id="totaal">0.00 EUR</td>
    </tr>

    <button id="herbereken">Herberekenen</button>
</table>

<script src="scripts/script.js"></script>
</body>
</html>
