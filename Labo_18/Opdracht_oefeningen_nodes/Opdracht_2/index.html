<!DOCTYPE html>
<html lang=”nl”>
<head>
    <meta charset=”utf-8”/>
    <title>Over mij</title>
    <link rel=”stylesheet” href=”styles/style.css”/>
</head>
<body>
<h1>About Me</h1>
<!-- Lijst met drie items. JS voegt aan elk li de class “listitem” toe
     zodat ze via CSS rood gekleurd worden.
     De lege spans kunnen eventueel later via JS gevuld worden. -->
<ul>
    <li>Nickname: <span id=”nickname”></span>
    <li>Favorieten: <span id=”favorites”></span>
    <li>Thuisstad: <span id=”hometown”></span>
</ul>
<!-- JS voegt ook een afbeelding toe aan de body -->
<script src=”scripts/script.js”></script>
</body>
</html>
