<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Opdracht: Formvalidatie</title>
    <link rel="stylesheet" href="styles/style.css" />
</head>
<body>
<table>
    <tr>
        <td><label for="voornaam">Voornaam</label></td>
        <td><input type="text" id="voornaam" /></td>
        <td><span class="error-msg" id="err_voornaam"></span></td>
    </tr>
    <tr>
        <td><label for="familienaam">Familienaam</label></td>
        <td><input type="text" id="familienaam" /></td>
        <td><span class="error-msg" id="err_familienaam"></span></td>
    </tr>
    <tr>
        <td><label for="geboortedatum">Geboortedatum</label></td>
        <td><input type="text" id="geboortedatum" placeholder="jjjj-mm-dd" /></td>
        <td><span class="error-msg" id="err_geboortedatum"></span></td>
    </tr>
    <tr>
        <td><label for="email">Email</label></td>
        <td><input type="text" id="email" /></td>
        <td><span class="error-msg" id="err_email"></span></td>
    </tr>
    <tr>
        <td><label for="aantalKinderen">Aantal kinderen</label></td>
        <td><input type="text" id="aantalKinderen" /></td>
        <td><span class="error-msg" id="err_aantalKinderen"></span></td>
    </tr>
</table>

<button onclick="valideer()">Valideer</button>
<script src="scripts/script.js"></script>
</body>
</html>
