<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <title>Opdracht: Formwaarden</title>
</head>
<body>
<table>
    <tr>
        <td>Is roker</td>
        <td><input type="checkbox" id="roker" /></td>
    </tr>
    <tr>
        <td>Moedertaal</td>
        <td>
            <label><input type="radio" name="moedertaal" value="nl" /> Nederlands</label>
            <label><input type="radio" name="moedertaal" value="fr" /> Frans</label>
            <label><input type="radio" name="moedertaal" value="en" /> Engels</label>
        </td>
    </tr>
    <tr>
        <td>Favoriete buurland</td>
        <td>
            <select id="buurland">
                <option value="Nederland">Nederland</option>
                <option value="Frankrijk">Frankrijk</option>
                <option value="Duitsland">Duitsland</option>
            </select>
        </td>
    </tr>
    <tr>
        <td>Bestelling</td>
        <td>
            <select id="bestelling" multiple size="6">
                <option value="aardappelen">aardappelen</option>
                <option value="brood">brood</option>
                <option value="melk">melk</option>
                <option value="biefstuk">biefstuk</option>
                <option value="chips">chips</option>
                <option value="krant">krant</option>
            </select>
        </td>
    </tr>
</table>



<button onclick="toonResultaat()">Toon resultaat</button>
<script src="scripts/script.js"></script>
</body>
</html>
